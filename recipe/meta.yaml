{% set python_min = "3.11" %}
{% set name = "stimuli" %}
{% set version = "1.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/stimuli-{{ version }}.tar.gz
  sha256: 788ffb7552e236130c047e5929076ebb373a48015d3ced39004e3a7bb67e33d0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - stimuli = stimuli.commands.main:run

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=64.0.0
  run:
    - click >=8.1
    - matplotlib-base
    - numpy >=1.23
    - packaging
    - psutil
    - pynput
    - pyserial
    - python >={{ python_min }}
    - python-sounddevice
    - scipy

test:
  imports:
    - stimuli
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
    - stimuli sys-info --help

about:
  home: https://mscheltienne.github.io/stimuli/
  summary: Accurate aditory stimuli that do not require PsychoPy.
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/mscheltienne/stimuli

extra:
  recipe-maintainers:
    - mscheltienne
